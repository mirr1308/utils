<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Custom Scheduler Editor</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.12/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.12/theme/neo.min.css">
	<script src="https://cdn.jsdelivr.net/npm/vanilla-picker@2.12.3/dist/vanilla-picker.min.js"></script>
	<script src="https://cdnjs.cloudflare.com/ajax/libs/js-beautify/1.14.0/beautify-html.min.js"></script>
</head>
<body>
	<header class="toolbar">
		<div class="tool-group">
			<button class="icon-btn" title="데이터 분석/적용" onclick="openModal('analysisModal')">
				<span class="material-symbols-outlined">table_chart</span>
			</button>
			<button class="icon-btn" title="커스텀 툴바 설정" onclick="openModal('ruleModal')">
				<span class="material-symbols-outlined">playlist_add</span>
			</button>
			<button class="icon-btn" title="캘린더 생성/변환" onclick="openModal('calendarModal')">
				<span class="material-symbols-outlined">Calendar_Month</span>
			</button>
		</div>
		
		<div class="divider"></div>

		<div class="tool-group">
			<button class="icon-btn" title="줄 확장" onclick="openModal('extendRowModal')">
				<span class="material-symbols-outlined">add_row_below</span>
			</button>
			<button class="icon-btn" title="칸 분할(추가)" onclick="splitCurrentRow(this)">
				<span class="material-symbols-outlined">splitscreen_add</span>
			</button>
			<button class="icon-btn" title="링크 삽입/변경" onclick="openModal('linkModal')">
				<span class="material-symbols-outlined">link</span>
			</button>
		</div>

		<div class="divider"></div>

		<div class="tool-group">
			<select title="글씨체" class="font-select" onchange="changeFontFamily(this.value)" onmousedown="this._preVal=this.value">
				<option value="">글씨체 (기본)</option>
				<option value="Arial, sans-serif">Arial</option>
				<option value="Tahoma, sans-serif">Tahoma</option>
				<option value="Verdana, sans-serif">Verdana</option>
				<option value="sans-serif">sans-serif</option>
				<option value="Georgia, serif">Georgia</option>
				<option value="'Palatino Linotype', 'Book Antiqua', Palatino, serif">Palatino Linotype</option>
				<option value="'Times New Roman', Times, serif">Times New Roman</option>
				<option value="serif">serif</option>
				<option value="Consolas, monospace">Consolas</option>
				<option value="'Courier New', Courier, monospace">courier new</option>
				<option value="'Lucida Console', Monaco, monospace">Lucida Console</option>
				<option value="monospace">monospace</option>
				<option value="Gulim, '굴림', sans-serif">굴림</option>
				<option value="Gungsuh, '궁서', serif">궁서</option>
				<option value="Dotum, '돋움', sans-serif">돋움</option>
				<option value="Batang, '바탕', serif">바탕</option>
				<option value="'Malgun Gothic', '맑은 고딕', sans-serif">맑은 고딕</option>
				<option value="'Nanum Gothic', '나눔 고딕', sans-serif">나눔 고딕</option>
			</select>
			<select title="글자 크기" class="font-select" onchange="changeFontSize(this.value)" style="width: 70px;">
				<option value="">크기</option>
				<option value="8px">8px</option>
				<option value="9px">9px</option>
				<option value="10px">10px</option>
				<option value="11px">11px</option>
				<option value="12px">12px</option>
				<option value="13px" selected>13px</option>
				<option value="14px">14px</option>
				<option value="15px">15px</option>
				<option value="16px">16px</option>
				<option value="18px">18px</option>
				<option value="20px">20px</option>
				<option value="24px">24px</option>
				<option value="28px">28px</option>
				<option value="32px">32px</option>
				<option value="36px">36px</option>
				<option value="40px">40px</option>
				<option value="48px">48px</option>
			</select>
			<button class="icon-btn" title="굵게" onclick="execStyle('bold')">
				<span class="material-symbols-outlined">format_bold</span>
			</button>
			<button class="icon-btn" title="기울임" onclick="execStyle('italic')">
				<span class="material-symbols-outlined">format_italic</span>
			</button>
			<button class="icon-btn" title="밑줄" onclick="execStyle('underline')">
				<span class="material-symbols-outlined">format_underlined</span>
			</button>
			<button class="icon-btn" title="취소선" onclick="execStyle('strike')">
				<span class="material-symbols-outlined">strikethrough_s</span>
			</button>
			<button class="icon-btn" title="글자색" onclick="openColor('text', this, event)">
				<span class="material-symbols-outlined">format_color_text</span>
			</button>

			<button class="icon-btn" title="배경색" onclick="openColor('bg', this, event)">
				<span class="material-symbols-outlined">format_color_fill</span>
			</button>
		</div>

		<div class="divider"></div>

		<div class="tool-group">
			<button class="icon-btn" title="왼쪽 정렬" onclick="align('left')">
				<span class="material-symbols-outlined">format_align_left</span>
			</button>
			<button class="icon-btn" title="중앙 정렬" onclick="align('center')">
				<span class="material-symbols-outlined">format_align_center</span>
			</button>
			<button class="icon-btn" title="오른쪽 정렬" onclick="align('right')">
				<span class="material-symbols-outlined">format_align_right</span>
			</button>
		</div>

		<div class="divider"></div>

		<div class="tool-group">
			<button class="icon-btn" title="설정 불러오기" onclick="uploadFile()">
				<span class="material-symbols-outlined">Upload</span>
			</button>
			<button class="icon-btn" title="설정 내보내기" onclick="downloadFile()">
				<span class="material-symbols-outlined">Download</span>
			</button>
			<button class="icon-btn" title="코드 복사" onclick="copyCode()">
				<span class="material-symbols-outlined">Copy_All</span>
			</button>
		</div>
		<div class="divider"></div>
		<div class="tool-group">
			<button class="primary-btn" title="도움말" onclick="window.open('https://mirr1308.github.io/utils/help/')">도움말</button>
		</div>
	</header>
	<nav id="customToolbar" class="custom-toolbar-area" style="display:none;"></nav>
	<main class="main-container">
		<div class="left-box">
			<div class="pane-header">HTML Editor</div>
			<textarea id="htmlInput" spellcheck="false" oninput="updatePreview()" style="display:none;"></textarea>
		</div>

		<div class="right-box">
			<div class="pane-header">
			<span>Live Preview</span>
			<button id="themeToggleBtn" class="theme-toggle-btn">Light</button>
			</div>
			
			<div id="previewArea" class="preview-content">
				</div>
		</div>
	</main>
	<div id="modalContainer"></div>
	<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.12/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.12/mode/xml/xml.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.12/mode/javascript/javascript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.12/mode/css/css.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.12/mode/htmlmixed/htmlmixed.min.js"></script>
    <script src="editor-core.js" defer></script>
	<script src="editor-analyzer.js" defer></script>
	<script src="modal-factory.js" defer></script>
    <script src="editor-tools.js" defer></script>
</body>
</html>
